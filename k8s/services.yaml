apiVersion: v1
kind: Service
metadata:
  name: php-service
spec:
  selector:
    app: vote-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort

---
apiVersion: v1
kind: Service
metadata:
  name: node-service
spec:
  selector:
    app: results-app
  ports:
    - protocol: TCP
      port: 3005
      targetPort: 3005
  type: NodePort

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
